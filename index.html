<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ucapan ulang tahun sederhana untuk Tesa.">
  <title>Ucapan Ulang Tahun Tesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="decorations" aria-hidden="true">
    <span class="sparkle sparkle-one"></span>
    <span class="sparkle sparkle-two"></span>
    <span class="sparkle sparkle-three"></span>
    <span class="confetti confetti-one"></span>
    <span class="confetti confetti-two"></span>
    <span class="bubble bubble-one"></span>
    <span class="bubble bubble-two"></span>
  </div>

  <main class="app-shell">
    <section class="view envelope-view is-active" id="envelopeView" aria-labelledby="envelopeTitle">
      <div class="greeting-card">
        <div class="envelope-wrap" aria-hidden="true">
          <div class="envelope" id="envelope">
            <div class="envelope-back"></div>
            <div class="letter">
              <span>Untuk Tesa</span>
              <strong>Happy 20th!</strong>
            </div>
            <div class="envelope-front"></div>
            <div class="envelope-flap"></div>
          </div>
        </div>

        <p class="eyebrow">Ucapan sederhana</p>
        <h1 id="envelopeTitle">Buka amplopnya</h1>
        <button class="primary-button" id="openEnvelopeBtn" type="button">
          Buka Amplop
        </button>
      </div>
    </section>

    <section class="view message-view" id="messageView" aria-labelledby="messageTitle">
      <button class="back-button" id="backBtn" type="button">Kembali</button>

      <div class="message-panel">
        <div class="message-badge" aria-hidden="true">
          <span>20</span>
          <small>tahun</small>
        </div>

        <div class="message-copy">
          <p class="eyebrow">Happy birthday</p>
          <h2 id="messageTitle">Selamat Ulang Tahun, Tesa</h2>

          <div class="message-text">
            <p>Selamat ulang tahun. Selamat berumur 20 tahun!</p>
            <p>Semoga panjang umur, sehat selalu, dan dilancarkan segala urusannya.</p>
            <p>Sukses terus untuk ke depannya!</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
